<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with My Portfolio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e; --ink-soft: #4a4a6a; --ink-muted: #8888aa;
    --bg: #f7f6ff; --surface: #ffffff; --accent: #6c4ff6;
    --accent-soft: #ede9ff; --accent-hover: #5a3de8; --border: #e4e2f5;
    --radius: 16px; --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --ink:#eeeeff; --ink-soft:#aaaacc; --ink-muted:#6666aa; --bg:#0f0e1a; --surface:#1a1830; --accent:#8b74ff; --accent-soft:#2a2060; --accent-hover:#7b64ef; --border:#2a2845; }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .avatar { width: 36px; height: 36px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .header-text p { font-size: 12px; color: var(--ink-muted); margin-top: 1px; }
  .dot-green { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-yellow { width: 7px; height: 7px; background: #eab308; border-radius: 50%; display: inline-block; margin-right: 4px; }

  #chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 9px; max-width: 88%; animation: fadeUp 0.18s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-icon { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 3px; }
  .msg.user .msg-icon { background: var(--accent); color: #fff; }
  .msg.bot  .msg-icon { background: var(--accent-soft); }

  .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; }
  .msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot  .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble p { margin-bottom: 6px; } .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 4px 0 10px 18px; padding: 0; }
  .bubble li { margin-bottom: 5px; line-height: 1.5; }
  .bubble li:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 600; }
  .source-tag { display: inline-block; margin-top: 7px; padding: 2px 8px; background: var(--accent-soft); color: var(--accent); border-radius: 20px; font-size: 11px; font-weight: 500; }

  .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px; }
  .dot { width: 6px; height: 6px; background: var(--ink-muted); border-radius: 50%; animation: bounce 1.1s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }

  #suggestions { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 7px; }
  .suggestion { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--ink-soft); background: var(--surface); cursor: pointer; transition: all .15s; font-family: var(--font); }
  .suggestion:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  footer { padding: 10px 14px 14px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  #input-row { display: flex; gap: 8px; align-items: flex-end; background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 7px 7px 7px 13px; transition: border-color .15s; }
  #input-row:focus-within { border-color: var(--accent); }
  #user-input { flex:1; border:none; background:transparent; font-family:var(--font); font-size:14px; color:var(--ink); resize:none; outline:none; line-height:1.5; max-height:110px; overflow-y:auto; padding: 2px 0; }
  #user-input::placeholder { color: var(--ink-muted); }
  #send-btn { width:32px; height:32px; background:var(--accent); border:none; border-radius:9px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition: background .15s, transform .1s; }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:active { transform: scale(.92); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  #setup-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; z-index:100; overflow-y:auto; }
  .setup-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px 28px; max-width:460px; width:100%; }
  .setup-card h2 { font-size:19px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  .setup-card .sub { font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:20px; }
  .setup-card label { display:block; font-size:11px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .setup-card input { width:100%; padding:10px 13px; border:1.5px solid var(--border); border-radius:10px; font-family:var(--font); font-size:14px; color:var(--ink); background:var(--bg); outline:none; margin-bottom:14px; transition:border-color .15s; }
  .setup-card input:focus { border-color: var(--accent); }
  .hint { font-size:12px !important; color:var(--ink-muted) !important; line-height:1.5 !important; margin-top:-10px !important; margin-bottom:16px !important; display:block; }
  .setup-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; font-family:var(--font); cursor:pointer; transition:background .15s; margin-top: 6px;}
  .setup-btn:hover { background: var(--accent-hover); }
  .setup-btn:disabled { background: var(--border); cursor: not-allowed; }
  .free-badge { display:inline-block; padding:3px 9px; background:#dcfce7; color:#166534; border-radius:20px; font-size:11px; font-weight:600; margin-left:6px; vertical-align:middle; }
  .sync-badge { display:inline-block; padding:3px 9px; background:#dbeafe; color:#1e40af; border-radius:20px; font-size:11px; font-weight:600; margin-left:6px; vertical-align:middle; }
  .setup-error { font-size: 12px; color: #dc2626; margin-top: -10px; margin-bottom: 14px; display: none; }

  @media (max-width:480px) { .msg { max-width:95%; } .setup-card { padding:24px 18px; } }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <h2>✦ Portfolio Assistant <span class="free-badge">Free</span><span class="sync-badge">Auto-sync</span></h2>
    <p class="sub">Edit your Google Doc anytime and this assistant updates automatically — no redeploy needed.</p>

    <label>Google Doc "Publish to Web" link</label>
    <input type="text" id="doc-url-input" placeholder="https://docs.google.com/document/d/e/.../pub">
    <span class="hint">→ In your Doc: File → Share → Publish to web → Publish → copy link</span>

    <label>Your name</label>
    <input type="text" id="name-input" placeholder="e.g. Namita" value="Namita">

    <p class="setup-error" id="setup-error"></p>
    <button class="setup-btn" id="launch-btn" onclick="saveSetup()">Launch my Portfolio Assistant →</button>
  </div>
</div>

<header>
  <div class="avatar">✦</div>
  <div class="header-text">
    <h1 id="header-name">Portfolio Assistant</h1>
    <p id="status-text"><span class="dot-green"></span>Ask anything about my work</p>
  </div>
</header>

<div id="chat"></div>

<div id="suggestions">
  <button class="suggestion" onclick="send(this.textContent)">What ML projects have you built?</button>
  <button class="suggestion" onclick="send(this.textContent)">What's your SQL experience?</button>
  <button class="suggestion" onclick="send(this.textContent)">What was your impact at Exclusive Crafts?</button>
  <button class="suggestion" onclick="send(this.textContent)">What technologies do you know?</button>
</div>

<footer>
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask about projects, skills, experience…"></textarea>
    <button id="send-btn" onclick="send()" title="Send">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/></svg>
    </button>
  </div>
</footer>

<script>
  let API_KEY = 'server-managed', DOC_URL = 'https://docs.google.com/document/d/e/2PACX-1vTePJJTDbSS302UsXntkdWA3_MBUkaRV3oG6M4nDuJNE0Phgt1uHh80ekAoo26i1pjJmroGGMkBl189/pub', KNOWLEDGE_BASE = '', isLoading = false, NAME = 'Namita';
  let history = [];

  // Auto-launch on page load using the hardcoded doc + name — no setup screen for visitors
  window.addEventListener('DOMContentLoaded', autoLaunch);

  async function autoLaunch() {
    try {
      const text = await fetchKnowledgeBase(DOC_URL);
      KNOWLEDGE_BASE = text;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('header-name').textContent = NAME + "'s Portfolio";
      addMessage('bot', `Hi, I'm ${NAME}. Ask me anything about my projects, experience, skills, or research — I'll answer directly based on my portfolio, kept fresh from my live doc.`);
    } catch (err) {
      // If auto-launch fails (e.g. doc URL not set yet), fall back to manual setup screen
      console.warn('Auto-launch failed, showing manual setup:', err.message);
    }
  }

  const input = document.getElementById('user-input');
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 110) + 'px'; });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

  // Convert a normal Google Doc share link or pub link into the plain-text export URL
  function toTextExportUrl(url) {
    // Published "pub" link -> already works, just request it directly (returns HTML, we'll strip tags)
    // We instead prefer the /export?format=txt pattern when a doc ID is present
    const idMatch = url.match(/\/document\/d\/(?:e\/)?([a-zA-Z0-9-_]+)/);
    if (idMatch) {
      // For published docs (id starts after /e/), plain pub URL with output=txt sometimes works;
      // safest universal approach: fetch the /pub page itself and strip HTML client-side.
      return url;
    }
    return url;
  }

  async function fetchKnowledgeBase(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Could not reach the Google Doc. Make sure it is published to web.');
    const html = await res.text();
    // Strip HTML tags down to readable text
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    let text = tmp.body ? tmp.body.innerText : tmp.innerText;
    if (!text || text.trim().length < 30) throw new Error('The doc looks empty or unpublished.');
    return text.trim();
  }

  async function saveSetup() {
    const docUrl = document.getElementById('doc-url-input').value.trim();
    const name = document.getElementById('name-input').value.trim() || 'Namita';
    const errEl = document.getElementById('setup-error');
    const btn = document.getElementById('launch-btn');
    errEl.style.display = 'none';

    if (!docUrl.includes('docs.google.com')) { showError('Please paste your Google Doc "Publish to web" link'); return; }

    btn.disabled = true; btn.textContent = 'Connecting to your Doc...';

    try {
      const text = await fetchKnowledgeBase(toTextExportUrl(docUrl));
      DOC_URL = toTextExportUrl(docUrl); KNOWLEDGE_BASE = text; NAME = name;

      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('header-name').textContent = name + "'s Portfolio";
      addMessage('bot', `Hi, I'm ${name}. Ask me anything about my projects, experience, skills, or research — I'll answer directly based on my portfolio, kept fresh from my live doc.`);
    } catch (err) {
      showError(err.message);
      btn.disabled = false; btn.textContent = 'Launch my Portfolio Assistant →';
    }

    function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Launch my Portfolio Assistant →'; }
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const icon = document.createElement('div'); icon.className = 'msg-icon'; icon.textContent = role === 'user' ? '👤' : '✦';
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.innerHTML = fmt(text);
    div.appendChild(icon); div.appendChild(bubble);
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function fmt(t) {
    // Escape any stray HTML first
    let html = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // Bold and italic
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
               .replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

    // Source tag (before list processing so it doesn't get swallowed)
    html = html.replace(/Source:\s*([^\n<]+)/gi, '@@SOURCE@@$1@@ENDSOURCE@@');

    const lines = html.split('\n');
    let out = [];
    let inUl = false, inOl = false;

    const closeLists = () => {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (inOl) { out.push('</ol>'); inOl = false; }
    };

    for (let raw of lines) {
      const line = raw.trim();
      if (line === '') { closeLists(); continue; }

      const bulletMatch = line.match(/^[-*•]\s+(.*)/);
      const numMatch = line.match(/^\d+[.)]\s+(.*)/);

      if (bulletMatch) {
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inUl) { out.push('<ul>'); inUl = true; }
        out.push(`<li>${bulletMatch[1]}</li>`);
      } else if (numMatch) {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (!inOl) { out.push('<ol>'); inOl = true; }
        out.push(`<li>${numMatch[1]}</li>`);
      } else {
        closeLists();
        // Heading-ish lines (## or ending in :)
        if (/^#{1,3}\s+/.test(line)) {
          out.push(`<p><strong>${line.replace(/^#{1,3}\s+/, '')}</strong></p>`);
        } else {
          out.push(`<p>${line}</p>`);
        }
      }
    }
    closeLists();

    let result = out.join('');
    result = result.replace(/@@SOURCE@@([^@]+)@@ENDSOURCE@@/g, '<span class="source-tag">📎 Source: $1</span>');
    return result;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div'); div.className = 'msg bot typing'; div.id = 'typing-indicator';
    const icon = document.createElement('div'); icon.className = 'msg-icon'; icon.textContent = '✦';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    div.appendChild(icon); div.appendChild(bubble);
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

  async function send(text) {
    if (isLoading) return;
    const userText = text || input.value.trim();
    if (!userText) return;

    document.getElementById('suggestions').style.display = 'none';
    input.value = ''; input.style.height = 'auto';
    addMessage('user', userText);
    history.push({ role: 'user', parts: [{ text: userText }] });

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    // Re-fetch the doc fresh on each message so edits are reflected instantly
    let freshKB = KNOWLEDGE_BASE;
    try { freshKB = await fetchKnowledgeBase(DOC_URL); KNOWLEDGE_BASE = freshKB; } catch(e) { /* fall back to cached KB */ }

    const systemInstruction = `You are ${NAME}, speaking directly to a recruiter or hiring manager who is asking about your background. Always answer in FIRST PERSON ("I built...", "My experience includes...", "I worked on..."). Never refer to yourself in third person or use your own name as if someone else is describing you.

HOW TO ANSWER:
- Never copy-paste raw chunks of the document. Synthesize and summarize in your own words, like confidently explaining your own background in conversation, not reciting a resume.
- Use short paragraphs and bullet points to make answers scannable. Recruiters skim — make it easy.
- Lead with the most relevant, impressive details first. Connect dots across sections when it strengthens the answer (e.g. link a skill to the project that demonstrates it).
- Keep it tight: 3-6 bullets or 2-4 short sentences per answer is usually enough. Don't dump everything you know — answer the actual question asked.
- Use a confident, professional, first-person tone — like you're in an interview, not reciting a document.
- Only use information found in the background content below. If something isn't covered, say so plainly in first person: "That's not something I've included in my portfolio" — never invent details.
- End every answer with: Source: [section name, e.g. Projects / Experience / Education / Skills]

YOUR BACKGROUND (use this to answer as yourself):
---
${freshKB}
---`;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: systemInstruction,
          contents: history
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const reply = data.candidates[0].content.parts[0].text;
      history.push({ role: 'model', parts: [{ text: reply }] });
      removeTyping();
      addMessage('bot', reply);
    } catch (err) {
      removeTyping();
      addMessage('bot', `Something went wrong: ${err.message}. If you're testing locally, the /api/chat function only works once deployed on Vercel.`);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
